<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zosima Quartet</title>
  <meta name="description" content="Zosima Quartet — nyckelharpa, two cellos and clarinet.">
  <meta name="theme-color" content="#231C16">
  <meta property="og:title" content="Zosima Quartet">
  <meta property="og:description" content="Nyckelharpa / two cellos / clarinet">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/images/zosima-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="site">
    <header class="hero" aria-label="Zosima Quartet">
      <div class="language-switch" aria-label="Language switch">
        <button class="lang-btn is-active" data-lang="cs" type="button">CZ</button>
        <span aria-hidden="true">/</span>
        <button class="lang-btn" data-lang="en" type="button">EN</button>
      </div>
      <img class="logo" src="assets/images/zosima-logo.png" alt="Zosima Quartet">
      <p class="tagline" data-field="tagline"></p>
    </header>

    <section class="section videos-section" aria-labelledby="listen-title">
      <div class="content-wrap wide-wrap">
        <h1 id="listen-title" class="small-heading line-heading" data-field="listenTitle"></h1>
        <div id="video-grid" class="video-grid" aria-label="YouTube videos"></div>
      </div>
    </section>

    <section class="section dark-section" aria-label="About and repertoire">
      <div class="content-wrap text-wrap two-column">
        <article>
          <h2 class="small-heading line-heading" data-field="aboutTitle"></h2>
          <p class="body-copy" data-field="aboutText"></p>
        </article>
        <article class="stacked-info">
          <h2 class="small-heading line-heading" data-field="repertoireTitle"></h2>
          <p class="body-copy emphasis" data-field="repertoireText"></p>
          <h3 class="small-heading subhead" data-field="characterTitle"></h3>
          <p class="body-copy emphasis short" data-field="characterText"></p>
          <h3 class="small-heading subhead" data-field="suitableTitle"></h3>
          <p class="body-copy emphasis short" data-field="suitableText"></p>
        </article>
      </div>
    </section>

    <section class="section gray-section" aria-label="Nyckelharpa and musicians">
      <div class="content-wrap text-wrap two-column">
        <article>
          <h2 class="small-heading line-heading" data-field="nyckelharpaTitle"></h2>
          <p class="body-copy" data-field="nyckelharpaText"></p>
        </article>
        <article>
          <h2 class="small-heading line-heading" data-field="musiciansTitle"></h2>
          <div id="musicians" class="musicians-list"></div>
        </article>
      </div>
    </section>

    <section class="contact-section" aria-label="Contact">
      <div class="content-wrap text-wrap contact-grid">
        <div class="contact-copy">
          <h2 data-field="contactTitle"></h2>
          <p data-field="contactText"></p>
          <a id="email-link" class="email-link" href="mailto:booking@zosimaquartet.com">BOOKING@ZOSIMAQUARTET.COM</a>
        </div>
        <div class="contact-links">
          <a id="mail-icon-link" class="contact-action" href="mailto:booking@zosimaquartet.com" aria-label="E-mail">
            <span class="icon-circle" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3.5 6.4h17c.8 0 1.5.7 1.5 1.5v9.9c0 .8-.7 1.5-1.5 1.5h-17c-.8 0-1.5-.7-1.5-1.5V7.9c0-.8.7-1.5 1.5-1.5zm.8 2.2v.2l7.7 5.1 7.7-5.1v-.2H4.3zm15.4 8.5v-6.2l-7.1 4.7c-.4.3-.8.3-1.2 0l-7.1-4.7v6.2h15.4z"/></svg></span>
            <span>E-mail</span>
          </a>
          <a id="facebook-link" class="contact-action" href="#" target="_blank" rel="noopener" aria-label="Facebook">
            <span class="icon-circle" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M14.2 8.1h2.1V4.6c-.4-.1-1.7-.2-3.2-.2-3.2 0-5.3 1.9-5.3 5.5v3.1H4.4v3.9h3.4v8.7h4.1v-8.7h3.4l.5-3.9h-3.9V10.3c0-1.1.3-2.2 2.3-2.2z"/></svg></span>
            <span>Facebook</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="assets/js/script.js"></script>
</body>
</html>
